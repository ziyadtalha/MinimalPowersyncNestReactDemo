replication:
  connections:
    - type: postgresql
      uri: postgresql://powersync_user:powersync123@host.docker.internal:5432/minimaldemo

      # SSL settings
      sslmode: disable # 'verify-full' (default) or 'verify-ca' or 'disable'

# Connection settings for sync bucket storage
storage:
  type: mongodb
  uri: mongodb://mongo:27017/powersync_demo

# The port which the PowerSync API server will listen on
port: 8080

sync_rules:
  content: |
    bucket_definitions:

      # ─────────────────────────────────────
      # Normal users → only their products
      # ─────────────────────────────────────
      user_products:
        parameters: |
          SELECT id AS user_id
          FROM "User"
          WHERE
            id = token_parameters.user_id
            AND role = 'USER'

        data:
          - |
            SELECT *
            FROM "Product"
            WHERE "ownerId" = bucket.user_id


      # ─────────────────────────────────────
      # Admins → all products
      # ─────────────────────────────────────
      admin_products:
        parameters: |
          SELECT 1 AS is_admin
          FROM "User"
          WHERE
            id = token_parameters.user_id
            AND role = 'ADMIN'

        data:
          - |
            SELECT *
            FROM "Product"
            WHERE bucket.is_admin = 1

# Settings for client authentication
client_auth:
  # Enable this if using Supabase Auth
  supabase: false
  
  # Symmetric key for HS256 JWT validation (HMAC with SHA-256)
  # Match the JWT_SECRET from your backend .env file
  # "supersecret" encoded as base64url = c3VwZXJzZWNyZXQ
  jwks:
    keys:
      - kty: oct
        alg: HS256
        k: c3VwZXJzZWNyZXQ
  
  # Audience must match JWT 'aud' claim from backend
  audience: ['powersync']
  
  # Map JWT 'sub' claim to 'user_id' for PowerSync
  # PowerSync will use this to filter sync buckets per user
  jwt_claims:
    user_id: sub

telemetry:
    # Opt out of reporting anonymized usage metrics to PowerSync telemetry service
    disable_telemetry_sharing: false